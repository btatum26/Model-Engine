services:
  # ---------------------------------------------------------------------------
  # THE BROKER: Redis
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: research_redis
    # Persistent storage: Saves the queue and job state every 60 seconds 
    # if at least 1 change occurred.
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - research_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # THE GATEWAY: FastAPI (Container A)
  # ---------------------------------------------------------------------------
  api:
    build: .
    container_name: research_api
    # 'uv run' ensures the environment from uv.lock is active
    command: uv run uvicorn src.daemon.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      # Shared volumes for persistent data and artifacts
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - research_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # THE EXECUTION: RQ Worker (Container B)
  # ---------------------------------------------------------------------------
  worker:
    build: .
    container_name: research_worker
    # Running the worker as a module to maintain absolute imports
    command: uv run python -m src.daemon.worker
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    volumes:
      # MUST match the API volumes for the "Shared Volume" strategy to work
      - ./data:/app/data
      - ./exports:/app/exports
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - research_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Testing with pytest
  # ---------------------------------------------------------------------------
  pytest:
    profiles: ["test"]
    build:
      context: .
      args:
        - UV_INSTALL_ARGS= # This forces uv to install dev dependencies (pytest)
      dockerfile: Dockerfile 
    container_name: research_tester
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
      - TEST_MODE=true
    volumes:
      - .:/app
      - /app/.venv # Anonymous volume to hide host .venv from container
      - ./data:/app/data
    # This ensures the main redis is up before testing starts
    depends_on:
      - redis
    # The command to run when this specific service is called
    command: uv run pytest

networks:
  research_net:
    driver: bridge

volumes:
  redis_data: